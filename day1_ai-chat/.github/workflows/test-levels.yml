name: Test Levels

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  level1:
    name: Level 1 — vitest + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest with coverage
        run: pnpm test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/
          retention-days: 30

  level2:
    name: Level 2 — Playwright smoke
    runs-on: ubuntu-latest
    needs: level1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright OS deps only (cache hit)
        run: pnpm exec playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Next.js build (standalone)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Stage standalone server assets
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Start standalone server
        run: |
          PORT=3030 HOSTNAME=0.0.0.0 node .next/standalone/server.js &
          echo $! > server.pid
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NODE_ENV: production

      - name: Wait for server
        run: pnpm exec wait-on http://localhost:3030 --timeout 60000

      - name: Run Playwright smoke
        run: pnpm exec playwright test e2e/smoke --reporter=list,html,json
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CI: 'true'

      - name: Stop server
        if: always()
        run: |
          [ -f server.pid ] && kill "$(cat server.pid)" 2>/dev/null || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  summary:
    name: Summary — sticky PR comment
    runs-on: ubuntu-latest
    needs: [level1, level2]
    if: always() && github.event_name == 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: ./artifacts/coverage
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: ./artifacts/playwright
        continue-on-error: true

      - name: Build summary body
        id: body
        run: |
          {
            echo "### Test Levels"
            echo ""
            echo "| Level | Status |"
            echo "|-------|--------|"
            echo "| 1 — vitest + coverage | ${{ needs.level1.result }} |"
            echo "| 2 — playwright smoke  | ${{ needs.level2.result }} |"
            echo ""
            if [ -f ./artifacts/coverage/coverage-summary.json ]; then
              LINES=$(node -e "console.log(require('./artifacts/coverage/coverage-summary.json').total.lines.pct)")
              echo "- Line coverage: **${LINES}%**"
            fi
            echo ""
            echo "- [Download coverage](../actions/runs/${{ github.run_id }}#artifacts)"
            echo "- [Download Playwright report](../actions/runs/${{ github.run_id }}#artifacts)"
          } > summary.md
          echo "path=summary.md" >> "$GITHUB_OUTPUT"

      - name: Find previous sticky comment
        id: find-comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '### Test Levels'

      - uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ steps.body.outputs.path }}
          edit-mode: replace
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
