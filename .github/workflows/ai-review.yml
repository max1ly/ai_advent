name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    # Skip fork PRs — GITHUB_TOKEN is read-only for forks
    if: github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: day1_ai-chat
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Transformers.js models
        uses: actions/cache@v4
        with:
          path: day1_ai-chat/.cache
          key: transformers-models-v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run AI review
        run: npx tsx .github/scripts/ai-review.ts
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
